kind = "web"
previewPath = "/"
title = "LeadFilter"
version = "1.0.0"
id = "artifacts/lead-filter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23999

[services.development]
run = "pnpm --filter @workspace/lead-filter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lead-filter", "run", "build" ]
publicDir = "artifacts/lead-filter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23999"
BASE_PATH = "/"
